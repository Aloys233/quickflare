name: Release Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux packages
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libfuse2 \
            libgtk-3-dev \
            libsecret-1-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            rpm \
            wget

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build deb, rpm and AppImage
        run: pnpm tauri build --ci --bundles deb rpm appimage

      - name: Build raw tar.gz
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          staging="dist-artifacts/quickflare-${version}-linux-x86_64"
          mkdir -p "$staging"
          cp src-tauri/target/release/quickflare "$staging/quickflare"
          cp README.md "$staging/README.md"
          if [ -f LICENSE ]; then cp LICENSE "$staging/LICENSE"; fi
          tar -C dist-artifacts -czf "dist-artifacts/quickflare-${version}-linux-x86_64.tar.gz" "quickflare-${version}-linux-x86_64"

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: quickflare-linux
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            dist-artifacts/*.tar.gz

      - name: Upload Linux packages to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
            dist-artifacts/*.tar.gz

  archlinux:
    name: Arch Linux package
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            curl \
            file \
            git \
            gtk3 \
            libayatana-appindicator \
            libsecret \
            librsvg \
            nodejs \
            npm \
            openssl \
            pkgconf \
            pnpm \
            rust \
            webkit2gtk-4.1

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Arch release binary
        run: pnpm tauri build --ci --no-bundle

      - name: Build pacman package
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          mkdir -p dist-arch
          cat > dist-arch/PKGBUILD <<EOF
          pkgname=quickflare
          pkgver=${version}
          pkgrel=1
          pkgdesc='A native-feeling Cloudflare Tunnel GUI for Linux, macOS and Windows.'
          arch=('x86_64')
          url='https://github.com/${GITHUB_REPOSITORY}'
          license=('custom')
          depends=('webkit2gtk-4.1' 'gtk3' 'libayatana-appindicator' 'libsecret' 'openssl')
          options=('!strip')

          package() {
            install -Dm755 "${GITHUB_WORKSPACE}/src-tauri/target/release/quickflare" "${pkgdir}/usr/bin/quickflare"
            install -Dm644 "${GITHUB_WORKSPACE}/src-tauri/icons/128x128.png" "${pkgdir}/usr/share/icons/hicolor/128x128/apps/quickflare.png"
            install -Dm644 "${GITHUB_WORKSPACE}/src-tauri/icons/32x32.png" "${pkgdir}/usr/share/icons/hicolor/32x32/apps/quickflare.png"
            install -Dm644 /dev/stdin "${pkgdir}/usr/share/applications/app.quickflare.desktop" <<DESKTOP
          [Desktop Entry]
          Type=Application
          Name=Quickflare
          Comment=Local Cloudflare Tunnel manager.
          Exec=quickflare
          Icon=quickflare
          Terminal=false
          Categories=Development;
          DESKTOP
            if [ -f "${GITHUB_WORKSPACE}/LICENSE" ]; then
              install -Dm644 "${GITHUB_WORKSPACE}/LICENSE" "${pkgdir}/usr/share/licenses/quickflare/LICENSE"
            fi
          }
          EOF
          useradd -m builder
          chown -R builder:builder "${GITHUB_WORKSPACE}"
          su builder -c "cd '${GITHUB_WORKSPACE}/dist-arch' && makepkg -f --noconfirm"

      - name: Upload Arch Linux package
        uses: actions/upload-artifact@v4
        with:
          name: quickflare-archlinux
          if-no-files-found: error
          path: dist-arch/*.pkg.tar.zst

      - name: Upload Arch Linux package to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-arch/*.pkg.tar.zst

  windows:
    name: Windows packages
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installers
        run: pnpm tauri build --ci --no-sign

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: quickflare-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload Windows packages to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
